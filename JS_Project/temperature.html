<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temperature Convert</title>
</head>
<body>
    
    <h1>Temperature Convert</h1>
    <label for="">Enter Temperature</label>
    <input type="number" id="temperatureInput" placeholder="Enter Temperature">
    <label for="">Convert:</label>
    <select name="" id="conversionType">
        <Option value="toCelcius">Celcius</Option>
        <Option value="toFerhenheit">Ferhenheit</Option>
    </select>
    <button id="convertBtn">Convert</button>

    <h2 >Result:</h2>
    <p id="result"></p>

    <script src="../JS_Function/temperature.js"></script>
</body>
</html>
